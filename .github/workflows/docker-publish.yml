name: Build & Publish Docker Image

# Builds the server Docker image from the private `companion` source at a
# specified tag/branch and publishes it to GHCR. Runs here (public repo) so
# it doesn't consume private-repo CI minutes.
#
# Secrets required in this repo:
#   - SOURCE_REPO_TOKEN  : PAT with `contents: read` on nhadaututtheky/companion
#   - GHCR_PUBLISH_TOKEN : PAT with `write:packages, read:packages` scopes
#                          (personal access token, owner = nhadaututtheky)
#
# The image is published under the original name for backwards compatibility:
#   ghcr.io/nhadaututtheky/companion
# Existing docker-compose pulls and landing download links keep working.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Companion ref to build (tag, branch, or SHA). Default: main"
        required: false
        type: string
        default: "main"
      image_tag:
        description: "Primary image tag (e.g. v0.22.0, latest). Empty = derive from ref"
        required: false
        type: string
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nhadaututtheky/companion

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout companion source
        uses: actions/checkout@v4
        with:
          repository: nhadaututtheky/companion
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nhadaututtheky
          password: ${{ secrets.GHCR_PUBLISH_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          REF="${{ inputs.ref }}"
          EXPLICIT_TAG="${{ inputs.image_tag }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAGS=""

          # If explicit image_tag supplied, use it as primary
          if [ -n "$EXPLICIT_TAG" ]; then
            TAGS="${IMAGE}:${EXPLICIT_TAG}"
          fi

          # If ref looks like a semver tag (v1.2.3), add version-derived tags
          if [[ "$REF" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            VER="${REF#v}"
            MAJMIN="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            [ -n "$TAGS" ] && TAGS="$TAGS,"
            TAGS="${TAGS}${IMAGE}:${VER},${IMAGE}:${MAJMIN},${IMAGE}:latest"
          elif [ "$REF" = "main" ] || [ -z "$TAGS" ]; then
            # Branch build or fallback → tag as main / latest
            [ -n "$TAGS" ] && TAGS="$TAGS,"
            TAGS="${TAGS}${IMAGE}:main,${IMAGE}:latest"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Resolved image tags:"
          echo "$TAGS" | tr ',' '\n'

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
