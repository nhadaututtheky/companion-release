name: Tauri Desktop Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.8.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RELEASE_REPO: nhadaututtheky/companion-release
  APPIMAGE_EXTRACT_AND_RUN: "1"

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact_name: "companion-windows"
          - platform: macos-latest
            artifact_name: "companion-macos"
          - platform: ubuntu-24.04
            artifact_name: "companion-linux"

    steps:
      - name: Checkout companion source
        uses: actions/checkout@v4
        with:
          repository: nhadaututtheky/companion
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: ${{ inputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libfuse3-dev

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Next.js web export
        shell: bash
        run: |
          cd packages/web
          bun run build
          cp -r out ../../src-tauri/web
          echo "Web export files:"
          ls -la ../../src-tauri/web/ | head -20

      - name: Build Bun server sidecar
        shell: bash
        run: |
          TARGET_TRIPLE=$(rustc -Vv | grep '^host:' | awk '{print $2}')
          OUTFILE="src-tauri/bun-server-${TARGET_TRIPLE}"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            OUTFILE="${OUTFILE}.exe"
          fi
          bun build packages/server/src/index.ts \
            --compile --target bun --outfile "$OUTFILE"
          ls -lh src-tauri/bun-server-*

      - name: Build Tauri app
        shell: bash
        env:
          NO_STRIP: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd src-tauri
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            # Skip AppImage (linuxdeploy broken on GH runners)
            sed -i 's/"createUpdaterArtifacts":.*/"createUpdaterArtifacts": false,/' tauri.conf.json
            cargo tauri build --bundles deb,rpm
          else
            cargo tauri build
          fi

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          REPO="${{ env.RELEASE_REPO }}"
          BUNDLE_DIR="src-tauri/target/release/bundle"

          gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 || \
            gh release create "$TAG" --repo "$REPO" --title "Companion $TAG" \
              --notes "## Companion $TAG
          Download the installer for your platform below.
          More info: https://companion.theio.vn"

          # Upload all build artifacts including updater files (.tar.gz, .zip)
          for f in $(find "$BUNDLE_DIR" \( \
            -name "*.msi" -o -name "*.exe" -o -name "*.dmg" \
            -o -name "*.AppImage" -o -name "*.deb" \
            -o -name "*.sig" -o -name "*.minisig" \
            -o -name "*.tar.gz" -o -name "*.zip" \
          \) 2>/dev/null); do
            echo "Uploading: $(basename $f)"
            gh release upload "$TAG" "$f" --repo "$REPO" --clobber || true
          done

          # Version-less aliases for stable download URLs
          DMG=$(find "$BUNDLE_DIR" -name "*.dmg" | head -1)
          [ -n "$DMG" ] && cp "$DMG" "Companion_aarch64.dmg" && \
            gh release upload "$TAG" "Companion_aarch64.dmg" --repo "$REPO" --clobber || true

          MSI=$(find "$BUNDLE_DIR" -name "*.msi" | head -1)
          [ -n "$MSI" ] && cp "$MSI" "Companion_x64-setup.msi" && \
            gh release upload "$TAG" "Companion_x64-setup.msi" --repo "$REPO" --clobber || true

          APPIMAGE=$(find "$BUNDLE_DIR" -name "*.AppImage" | head -1)
          [ -n "$APPIMAGE" ] && cp "$APPIMAGE" "Companion_amd64.AppImage" && \
            gh release upload "$TAG" "Companion_amd64.AppImage" --repo "$REPO" --clobber || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/**/*.tar.gz
            src-tauri/target/release/bundle/**/*.zip
          retention-days: 7
          if-no-files-found: warn

  # ── Auto-update manifests + deploy landing ─────────────────────────────
  update-manifests:
    name: Update auto-update manifests
    needs: build
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout companion source
        uses: actions/checkout@v4
        with:
          repository: nhadaututtheky/companion
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: main

      - name: Download signatures and build manifests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          REPO="${{ env.RELEASE_REPO }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RELEASE_BASE="https://github.com/${REPO}/releases/download/${TAG}"

          sleep 10

          mkdir -p /tmp/sigs
          for sig in \
            "Companion_${VERSION}_x64-setup.exe.sig" \
            "Companion_${VERSION}_x64-setup.nsis.zip.sig" \
            "Companion.app.tar.gz.sig" \
          ; do
            echo "Downloading $sig..."
            gh release download "$TAG" --repo "$REPO" --pattern "$sig" --dir /tmp/sigs --clobber 2>/dev/null || echo "WARN: $sig not found"
          done

          ls -la /tmp/sigs/ || true

          WIN_SIG=""
          if [ -f "/tmp/sigs/Companion_${VERSION}_x64-setup.exe.sig" ]; then
            WIN_SIG=$(cat "/tmp/sigs/Companion_${VERSION}_x64-setup.exe.sig")
          elif [ -f "/tmp/sigs/Companion_${VERSION}_x64-setup.nsis.zip.sig" ]; then
            WIN_SIG=$(cat "/tmp/sigs/Companion_${VERSION}_x64-setup.nsis.zip.sig")
          fi

          MAC_SIG=""
          if [ -f "/tmp/sigs/Companion.app.tar.gz.sig" ]; then
            MAC_SIG=$(cat "/tmp/sigs/Companion.app.tar.gz.sig")
          fi

          NOTES="See https://companion.theio.vn for details."

          # Generate manifests
          for manifest in windows-x86_64:exe:WIN darwin-aarch64:dmg:MAC linux-x86_64:deb:NONE; do
            IFS=: read -r PLATFORM EXT SIG_VAR <<< "$manifest"
            case "$PLATFORM" in
              windows-x86_64)
                URL="${RELEASE_BASE}/Companion_${VERSION}_x64-setup.exe"
                SIG="$WIN_SIG"
                ;;
              darwin-aarch64)
                URL="${RELEASE_BASE}/Companion_${VERSION}_aarch64.dmg"
                SIG="$MAC_SIG"
                ;;
              linux-x86_64)
                URL="${RELEASE_BASE}/Companion_${VERSION}_amd64.deb"
                SIG=""
                ;;
            esac

            cat > "landing/updates/${PLATFORM}.json" <<EOF
          {
            "version": "${VERSION}",
            "url": "${URL}",
            "signature": "${SIG}",
            "notes": "${NOTES}",
            "pub_date": "${PUB_DATE}"
          }
          EOF
          done

          echo "=== Generated manifests ==="
          cat landing/updates/*.json

      - name: Commit and push manifests
        run: |
          TAG="${{ inputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add landing/updates/
          git diff --cached --quiet && echo "No manifest changes" && exit 0
          git commit -m "chore: auto-update manifests for ${TAG}"
          git push origin main

      - name: Deploy landing to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy landing --project-name companion-landing --commit-dirty=true
