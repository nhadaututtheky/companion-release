name: CI Quality Gates

# Runs lint + typecheck + tests + web build against the private `companion`
# source repo. Triggered manually (or from /ship); we intentionally do NOT
# enable push triggers on the private repo to avoid burning its CI minutes.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Companion ref to check (branch, tag, or SHA). Default: main"
        required: false
        type: string
        default: "main"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout companion source
        uses: actions/checkout@v4
        with:
          repository: nhadaututtheky/companion
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: ${{ inputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Type check (shared)
        run: cd packages/shared && bun run check

      - name: Type check (server)
        run: cd packages/server && bun run check

      - name: Type check (web)
        run: cd packages/web && bun run check

      - name: Test (server)
        run: |
          cd packages/server
          failed=0
          for f in src/services/*.test.ts src/tests/*.test.ts; do
            echo "::group::$f"
            if ! bun test "$f"; then
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

      - name: Test (web)
        run: cd packages/web && bun test

      - name: Build (web)
        run: cd packages/web && bun run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3579
